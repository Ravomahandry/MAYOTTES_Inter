<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mayotte | Carte Interactive des Sites</title>

  <!-- SDK ArcGIS -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">

  <!-- Styles locaux -->
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

  <!-- Barre de recherche flottante -->
  <div class="search-container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Rechercher un site (nom, ID, état)..." autocomplete="off">
      <div id="resultsCount" class="badge-count">Chargement...</div>
    </div>
    <div id="searchResults" class="results-dropdown"></div>
  </div>

  <!-- Légende flottante (bas-gauche) -->
  <div class="legend-panel">
    <h4>État de santé global</h4>
    <div id="legendContent"></div>
  </div>

  <!-- Conteneur de carte -->
  <div id="viewDiv"></div>

  <!-- ArcGIS JS API (async + defer pour meilleure compatibilité) -->
  <script async defer src="https://js.arcgis.com/4.31/" onload="window.__arcgisLoaded = true;"></script>

  <!-- Logique applicative -->
  <script defer src="./assets/app.js"></script>
</body>
</html>
